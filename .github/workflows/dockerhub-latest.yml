name: CI to Docker Hub

# Controls when the action will run.
on:
  # Triggers the workflow on push events but only for the master branch
  push:
    branches: [ master ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Least-privilege token
permissions:
  contents: read
  id-token: write        # keyless image signing with cosign
  security-events: write # upload Trivy SARIF to the Security tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Actions are pinned to full commit SHAs
      - name: Check Out Repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Docker meta (OCI labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: kommonitor/keycloak

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push | target = postgres
        id: docker_build_postgres
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./
          file: ./Dockerfile
          target: postgres
          push: true
          tags: kommonitor/keycloak:latest-postgres
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha,scope=postgres
          cache-to: type=gha,mode=max,scope=postgres

      - name: Build and push | target = mssql
        id: docker_build_mssql
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./
          file: ./Dockerfile
          target: mssql
          push: true
          tags: kommonitor/keycloak:latest-mssql
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha,scope=mssql
          cache-to: type=gha,mode=max,scope=mssql

      # Released images are scanned and the result uploaded to the Security tab.
      # Report-only for now (exit-code 0). Switch exit-code to '1' to fail the
      # build on unfixed CRITICAL/HIGH findings once the image is clean.
      - name: Trivy scan | postgres
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: kommonitor/keycloak@${{ steps.docker_build_postgres.outputs.digest }}
          format: sarif
          output: trivy-postgres.sarif
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Upload Trivy results | postgres
        uses: github/codeql-action/upload-sarif@411c4c9a36b3fca4d674f06b6396b2c6d23522c6 # v3
        with:
          sarif_file: trivy-postgres.sarif
          category: trivy-postgres

      - name: Trivy scan | mssql
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: kommonitor/keycloak@${{ steps.docker_build_mssql.outputs.digest }}
          format: sarif
          output: trivy-mssql.sarif
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Upload Trivy results | mssql
        uses: github/codeql-action/upload-sarif@411c4c9a36b3fca4d674f06b6396b2c6d23522c6 # v3
        with:
          sarif_file: trivy-mssql.sarif
          category: trivy-mssql

      # Keyless cosign signing via the GitHub Actions OIDC identity. Verify with:
      #   cosign verify kommonitor/keycloak@<digest> \
      #     --certificate-identity-regexp '^https://github.com/kommonitor/keycloak-extensions/' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
      - name: Sign images (keyless cosign)
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign kommonitor/keycloak@${{ steps.docker_build_postgres.outputs.digest }}
          cosign sign kommonitor/keycloak@${{ steps.docker_build_mssql.outputs.digest }}

      - name: Image digests
        run: |
          echo "postgres: ${{ steps.docker_build_postgres.outputs.digest }}"
          echo "mssql:    ${{ steps.docker_build_mssql.outputs.digest }}"
