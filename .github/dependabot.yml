# Keeps base-image digests, GitHub Action SHAs and Maven dependencies current
version: 2
updates:
  # Base images pinned in the Dockerfile (tag + @sha256 digest)
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  # Pinned GitHub Actions in .github/workflows/*
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  # Keycloak SPI / provider dependencies in pom.xml
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
